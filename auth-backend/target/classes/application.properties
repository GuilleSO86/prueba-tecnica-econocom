# Application name
spring.application.name=auth-backend

# Application port
server.port=8080

# =================================
# START - H2 Database Configuration
# =================================

# H2 Database - Memory connection (no file)
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console - Enabled in '/h2-console'
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Execution of SQL scripts (data.sql) after Hibernate table creation
spring.jpa.defer-datasource-initialization=true

# ===============================
# END - H2 Database Configuration
# ===============================

# JWT Configuration
jwt.secret=your256bitsigningkeyforjwttokenvalidationmustbe32bytesormore
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:4200

# Logging Configuration
logging.level.root=INFO
logging.level.com.econocom.auth=DEBUG

# Console output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File output
logging.file.name=logs/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File rotation (optional)
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.file-name-pattern=logs/archived/application-%d{yyyy-MM-dd}.%i.log